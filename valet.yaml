name: agentmail-gtm-agent
display_name: AgentMail GTM Agent
description: >-
  Cold outreach that ships, follows up once, and routes the warm
  replies. Queue prospects via Slack. The agent writes a tight
  first-touch, follows up at 96 hours, classifies inbound replies,
  and forwards the interested ones to your sales inbox.
category: outbound

example:
  prompt: "Who's been queued? Who replied today?"

story:
  hero: "Cold outreach that ships, follows up, and routes the warm replies."
  subheadline: >-
    Queue prospects via Slack. The agent sends a personalized
    first-touch, follows up once at 96 hours, classifies inbound
    replies, and forwards the interested ones to your sales inbox.
  steps:
    - role: trigger
      title: "Queue a prospect from Slack."
      body: >-
        @mention the bot with the email and a one-line hook. The
        agent picks it up on the next sweep.
      catalog: slack
    - role: action
      title: "Tight first-touch, one follow-up."
      body: >-
        80-word personalized email, one ask, no fluff. Auto
        follow-up at 96 hours if no reply.
      catalog: agentmail
    - role: outcome
      title: "Warm replies forwarded to sales."
      body: >-
        Interested replies forward to your sales inbox. OOO and
        not-interested are silenced. Questions ping you in Slack.
      catalog: agentmail

connectors:
  - catalog: agentmail
    description: >-
      The AgentMail CLI, preconfigured with your API key. The
      agent uses it to send first-touch emails from a dedicated
      outbound inbox, follow up at 96 hours, classify replies,
      and forward warm leads. Prospects are queued ad-hoc by
      @mentioning the bot in Slack; the sales handoff email is
      set in SOUL.md before deploy.
    slot_descriptions:
      AGENTMAIL_API_KEY: >-
        Sign up at agentmail.to and copy the API key.
    ui:
      headline: "Connect AgentMail with an API key."
      blurb: >-
        Paste your AgentMail API key. Queue prospects by
        @mentioning the bot in Slack ("queue jane@acme.com hook:
        saw your post on X"). Set the sales handoff email in
        SOUL.md.
      done_note: "AgentMail connected"

channels:
  - catalog: slack
    description: >-
      The agent gets its own Slack bot. @mention to queue a
      prospect ("queue jane@acme.com hook: ..."), ask who's been
      contacted, who replied, who's due for follow-up, or pause
      sends.
    ui:
      headline: "Give the GTM Agent a Slack bot."
      blurb: >-
        Queue prospects from Slack and watch follow-ups, replies,
        and warm hand-offs land in the same channel.
      done_note: "Bot ready — invite it to a channel"

  - catalog: webhook
    description: >-
      Generic webhook channel that fires the agent on every
      AgentMail message.received event so reply classification
      runs in real time. After deploy, run
      `agentmail webhooks create --url <agent-webhook-url> --event message.received`
      from your terminal.

  - type: heartbeat
    every: 1h
    timezone: UTC
    description: "Sweeps MEMORY.md prospects once an hour for queued first-touches and 96-hour follow-ups due. Hourly resolution is fine — outreach windows aren't minute-sensitive."
