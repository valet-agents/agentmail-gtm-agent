name: agentmail-gtm-agent
display_name: AgentMail GTM Agent
description: >-
  Cold outreach that ships, follows up once, and routes the warm
  replies. Drop a CSV of prospects. The agent writes a tight
  first-touch, follows up at 96 hours, classifies inbound replies,
  and forwards the interested ones to your sales inbox.
category: outbound

example:
  prompt: "Who's been queued? Who replied today?"

story:
  hero: "Cold outreach that ships, follows up, and routes the warm replies."
  subheadline: >-
    Drop a CSV of prospects. The agent sends a personalized
    first-touch, follows up once at 96 hours, classifies inbound
    replies, and forwards the interested ones to your sales inbox.
  steps:
    - role: trigger
      title: "Queue a prospect."
      body: >-
        Add to your CSV slot or @mention the bot in Slack. The
        agent picks it up on the next sweep.
      catalog: webhook
    - role: action
      title: "Tight first-touch, one follow-up."
      body: >-
        80-word personalized email, one ask, no fluff. Auto
        follow-up at 96 hours if no reply.
      catalog: agentmail
    - role: outcome
      title: "Warm replies forwarded to sales."
      body: >-
        Interested replies forward to your sales inbox. OOO and
        not-interested are silenced. Questions ping you in Slack.
      catalog: agentmail

connectors:
  - catalog: agentmail
    description: >-
      The AgentMail CLI, preconfigured with your API key. The
      agent uses it to send first-touch emails from a dedicated
      outbound inbox, follow up at 96 hours, classify replies,
      and forward warm leads.
    slot_descriptions:
      AGENTMAIL_API_KEY: >-
        Sign up at agentmail.to and copy the API key.
      PROSPECTS_CSV: >-
        The prospect list as CSV. Required columns: email,
        first_name, company, hook (one-line context the
        agent uses to personalize the first-touch).
      SALES_HANDOFF_EMAIL: >-
        Where to forward replies the agent classifies as
        interested.
    ui:
      headline: "Wire the GTM agent to your prospect list."
      blurb: >-
        AgentMail key, your prospect CSV, and the inbox that
        gets the warm leads.
      done_note: "AgentMail connected"

channels:
  - catalog: slack
    description: >-
      The agent gets its own Slack bot. @mention to ask who's
      been contacted, who replied, who's due for follow-up, or
      to queue a one-off prospect.
    ui:
      headline: "Give the GTM Agent a Slack bot."
      blurb: >-
        Visibility into the queue, the follow-ups due, and the
        replies routed today.
      done_note: "Bot ready — invite it to a channel"

  - catalog: webhook
    description: >-
      Generic webhook channel that fires the agent on every
      AgentMail message.received event so reply classification
      runs in real time. After deploy, run
      `agentmail webhooks create --url <agent-webhook-url> --event message.received`
      from your terminal.

  - type: heartbeat
    every: 1h
    timezone: UTC
    description: "Sweeps the prospect list once an hour for queued first-touches and 96-hour follow-ups due. Hourly resolution is fine — outreach windows aren't minute-sensitive."
